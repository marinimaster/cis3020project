<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/public/styles.css">
    <link rel="stylesheet" href="/styles.css">
    <title>Login</title>
</head>

<body class="body-login">

    <header class="app-header login-header">

        <div class="brand">
            <h1>Polylearning</h1>
            <span class="header-subtitle" id="header-subtitle">Standard User Access</span>
        </div>

    </header>

    <aside class="login-aside">

    </aside>

    <main class="main-dashboard">
        <!-- https://cis3020project.onrender.com -->
        <form id="login-form" method="POST" action="/api/login/standard">

            <h3 id="login-title">Standard Login</h3>

            <div class="form-group">
                <label for="login-role">Login Type</label>
                <select class="login-input" id="login-role" name="loginRole">
                    <option value="standard" selected>Standard User</option>
                    <option value="admin">Admin Login</option>
                </select>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input class="login-input" type="text" id="username" name="username" placeholder="Enter username"
                    required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input class="login-input" type="password" id="password" name="password" placeholder="Enter password"
                    required />
            </div>

            <input class="login-submit" type="submit" value="Sign In">
            <p id="error-message"></p>

        </form>
    </main>

    <footer class="footer-dashboard">

    </footer>

    <script src="/index.js"></script>
</body>

</html>
