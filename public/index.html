<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Login</title>
</head>

<body class="body-login">

    <header>
        <div class="leftheaderdiv">
            <h1>Polylearning</h1>
        </div>

    </header>

    <aside class="login-aside">

    </aside>

    <main class="main-dashboard">

        <!--deployed action: https://cis3020project.onrender.com/api/login-->
        <form id="login-form" method="POST" action="https://cis3020project.onrender.com/api/login">

            <h3>Login</h3>
            <h3>Je t'aime la vie</h3>

            <div class="form-group">
                <label for="username">Username</label>
                <input class="login-input" type="text" id="username" name="username" placeholder="Enter username"
                    required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input class="login-input" type="password" id="password" name="password" placeholder="Enter password"
                    required />
            </div>

            <input class="login-submit" type="submit" value="Sign In">
            <p id="error-message"></p>

        </form>
    </main>

    <footer class="footer-dashboard">

    </footer>

    <script src="index.js"></script>
</body>

</html>
