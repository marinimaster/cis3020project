<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Zalando+Sans:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href='/public/styles.css'>
    <style>
    </style>
    <title>School of Arts</title>
</head>

<body>
<header class="app-header">

    <div class="brand">
        <h1>Polylearning</h1>
        <span class="header-subtitle">Administration Panel</span>
    </div>

    <nav class="primary-nav" aria-label="Main navigation">
        <ul>
            <li><a href="#">Users</a></li>
            <li><a href="#">Wallets</a></li>
            <li><a href="#">Transactions</a></li>
        </ul>
    </nav>

    <div class="utility">
        <a href="/logout" class="logout-link">Logout</a>
    </div>

</header>

    <aside>
        <section class="aside-header">
            <h3>Management</h3>
        </section>

        <div class="asideitem">Manage Users</div>
        <div class="asideitem">Create User</div>
        <div class="asideitem">Wallets</div>
        <div class="asideitem">Transactions</div>
    </aside>

    <main class="dashboard-main">

        <section class="dashboard-header">
            <h2>Billing Overview</h2>
        </section>

        <section class="dashboard-cards">

            <div class="card">
                <h3>Total Users</h3>
                <p id="student-count"></p>
            </div>

            <div class="card">
                <h3>Active Wallets</h3>
                <p>--</p>
            </div>

            <div class="card">
                <h3>Total Transactions</h3>
                <p>--</p>
            </div>

            <div class="card">
                <h3>System Revenue</h3>
                <p>$8,500</p>
            </div>

        </section>

    </main>

    <footer class="footer-dashboard">

    </footer>

    <script src="index.js"></script>
</body>

</html>
