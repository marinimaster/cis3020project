<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Zalando+Sans:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="/public/styles.css">
    <title>Student Dashboard</title>
</head>

<body>
<header class="app-header">

    <div class="brand">
        <h1>Polylearning</h1>
        <span class="header-subtitle">Student Dashboard</span>
    </div>

    <div class="utility">
        <a href="/logout" class="logout-link">Logout</a>
    </div>

</header>

    <aside>
        <section class="aside-header">
            <h3>My Workspace</h3>
        </section>

        <div class="asideitem"><a href="/dashboard">My Courses</a></div>
        <div class="asideitem"><a href="/billing">Billing</a></div>
    </aside>

    <main class="dashboard-main billing-main">

        <section class="dashboard-header">
            <h2>Billing</h2>
        </section>

        <section class="dashboard-cards">

            <div class="card billing-card">
                <h3>Balance</h3>
                <p>$<span id="card-balance" class="p-fetch"></span></p>
            </div>

        </section>

    </main>

    <footer class="footer-dashboard">

    </footer>

    <script src="/index.js"></script>
</body>

</html>
