<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Zalando+Sans:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/public/styles.css">
    <link rel="stylesheet" href="/styles.css">
    <title>Admin Dashboard Template</title>
</head>

<body>
    <header class="app-header">

        <div class="brand">
            <h1>Polylearning</h1>
            <span class="header-subtitle">Administration Panel</span>
        </div>

        <div class="utility">
            <a href="/logout" class="logout-link">Logout</a>
        </div>

    </header>

    <aside>
        <section class="aside-header">
            <h3>Management</h3>
        </section>

        <div class="asideitem"><a href="/admin/dashboard">Billing Overview</a></div>
        <div class="asideitem"><a href="/admin/manage-users">Manage Users</a></div>
    </aside>

    <main class="dashboard-main">

        <section class="dashboard-header">
            <h2>Create User</h2>
        </section>

        <section class="dashboard-cards create-user">

            <div class="card">
                <div class="card-header">
                    <h3>Manage Users</h3>
                </div>

                <div class="card-body">

                    <form id="create-user-form" method="POST" action="/admin/create-user">

                        <label for="username">Username</label>
                        <input id="username" type="text" name="username" required>

                        <label for="password">Password</label>
                        <input id="password" type="password" name="password" required>

                        <input type="submit" value="Register">

                    </form>

                </div>
            </div>

        </section>

    </main>

    <footer class="footer-dashboard">

    </footer>

    <script src="/index.js"></script>
</body>

</html>
